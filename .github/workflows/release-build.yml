name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build release APK (unsigned)
        run: ./gradlew assembleRelease

      - name: Build release AAB
        run: ./gradlew bundleRelease

      - name: Upload release APK to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: puzzle-quest-release-apk
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Upload release AAB to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: puzzle-quest-release-aab
          path: app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/bundle/release/app-release.aab
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to Play Store (optional)
        # This step is optional and requires Play Store service account JSON
        # Uncomment and configure when ready for Play Store publishing
        # uses: r0adkll/upload-google-play@v1
        # with:
        #   serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
        #   packageName: com.pingsama.puzzlequest
        #   releaseFiles: app/build/outputs/bundle/release/app-release.aab
        #   track: internal
        run: echo "Play Store upload step is optional - configure when ready"
